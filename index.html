<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hào Khí Ngàn Năm: Cuộc Chiến Vệ Quốc</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #C8102E; --gold: #FFD700; --gold-dark: #B8860B;
            --bg: #0A0A0F; --glass: rgba(10,10,15,0.75);
            --font-h: 'Playfair Display', serif; --font-b: 'Inter', sans-serif;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:var(--bg); font-family:var(--font-b); }
        #gameCanvas { display:block; width:100vw; height:100vh; }

        /* Title Screen */
        #titleScreen {
            position:fixed; inset:0; z-index:100; display:flex;
            flex-direction:column; align-items:center; justify-content:center;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a0a 50%, #0a0a1a 100%);
            transition: opacity 0.8s ease;
        }
        #titleScreen.hidden { opacity:0; pointer-events:none; }
        .title-bg { position:absolute; inset:0; opacity:0.15; background:url('assets/title_screen.png') center/cover; }
        .title-particles { position:absolute; inset:0; }
        .title-content { position:relative; z-index:2; text-align:center; }
        .title-icon { font-size:5rem; margin-bottom:16px; animation: float 3s ease-in-out infinite; }
        .title-main {
            font-family:var(--font-h); font-size:3.5rem; font-weight:900;
            background: linear-gradient(135deg, var(--gold), #FFE55C, var(--gold-dark));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.3)); margin-bottom:8px;
        }
        .title-sub {
            font-size:1.1rem; letter-spacing:6px; text-transform:uppercase;
            color:#BDB3A3; margin-bottom:48px;
        }
        .title-divider {
            width:200px; height:2px; margin:0 auto 48px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            position:relative;
        }
        .title-divider::after {
            content:'⚔️'; position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%); font-size:1.5rem;
            background: #0a0a1a; padding:0 16px;
        }
        .btn-start {
            padding:18px 56px; font-family:var(--font-h); font-size:1.1rem; font-weight:700;
            letter-spacing:4px; text-transform:uppercase; color:var(--bg);
            background: linear-gradient(135deg, var(--gold), #FFE55C);
            border:none; border-radius:4px; cursor:pointer;
            transition: all 0.4s ease; position:relative; overflow:hidden;
        }
        .btn-start:hover { transform:translateY(-3px); box-shadow:0 10px 40px rgba(255,215,0,0.4); }
        .btn-start::before {
            content:''; position:absolute; top:0; left:-100%;
            width:100%; height:100%;
            background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .btn-start:hover::before { left:100%; }
        .controls-hint {
            margin-top:32px; color:#666; font-size:0.75rem; letter-spacing:1px;
            line-height:1.8;
        }
        .controls-hint kbd {
            background:rgba(255,255,255,0.1); padding:2px 8px;
            border-radius:3px; border:1px solid rgba(255,255,255,0.15);
            font-family:var(--font-b); color:#aaa;
        }

        /* HUD */
        #hud {
            position:fixed; top:0; left:0; right:0; z-index:50;
            padding:16px 24px; display:none;
            background: linear-gradient(180deg, rgba(10,10,15,0.9) 0%, transparent 100%);
        }
        #hud.visible { display:flex; justify-content:space-between; align-items:flex-start; }
        .hud-left, .hud-right { display:flex; flex-direction:column; gap:8px; }
        .hud-center { text-align:center; }
        .stat-row { display:flex; align-items:center; gap:8px; }
        .stat-icon { font-size:1.1rem; width:24px; text-align:center; }
        .stat-bar {
            width:140px; height:8px; background:rgba(255,255,255,0.1);
            border-radius:4px; overflow:hidden;
        }
        .stat-fill {
            height:100%; border-radius:4px; transition:width 0.5s ease;
        }
        .fill-hp { background: linear-gradient(90deg, #e53935, #ff7043); }
        .fill-stamina { background: linear-gradient(90deg, #43A047, #66BB6A); }
        .fill-mana { background: linear-gradient(90deg, var(--red), var(--gold)); }
        .stat-text { font-size:0.7rem; color:#aaa; min-width:40px; font-weight:600; }
        .combo-display {
            font-family:var(--font-h); font-size:0.8rem; color:var(--gold);
            letter-spacing:2px; text-transform:uppercase; opacity:0.7;
        }
        .combo-name {
            font-size:1.1rem; color:white; font-weight:700;
            opacity:0; transition: opacity 0.3s;
        }
        .combo-name.show { opacity:1; }
        .skill-slots { display:flex; gap:6px; margin-top:4px; }
        .skill-slot {
            width:36px; height:36px; border-radius:6px;
            background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
            display:flex; align-items:center; justify-content:center;
            font-size:0.9rem; position:relative;
        }
        .skill-slot .key-hint {
            position:absolute; bottom:-14px; font-size:0.55rem;
            color:#666; letter-spacing:1px;
        }
        .skill-cd {
            position:absolute; inset:0; background:rgba(0,0,0,0.7);
            border-radius:6px; display:none;
        }

        /* Damage popup */
        .dmg-popup {
            position:fixed; z-index:60; font-family:var(--font-h);
            font-size:1.5rem; font-weight:900; pointer-events:none;
            animation: dmgFloat 1s ease forwards;
        }
        .dmg-popup.dealt { color:var(--gold); }
        .dmg-popup.taken { color:#ff5252; }
        .dmg-popup.heal { color:#66BB6A; }

        /* Death screen */
        #deathScreen {
            position:fixed; inset:0; z-index:90; display:none;
            flex-direction:column; align-items:center; justify-content:center;
            background:rgba(10,5,5,0.9);
        }
        #deathScreen.show { display:flex; }
        .death-text { font-family:var(--font-h); font-size:2.5rem; color:#e53935; margin-bottom:24px; }
        .btn-retry {
            padding:14px 40px; font-family:var(--font-h); font-size:0.9rem;
            color:white; background:transparent; border:1px solid var(--gold);
            border-radius:4px; cursor:pointer; letter-spacing:2px;
            transition: all 0.3s;
        }
        .btn-retry:hover { background:var(--gold); color:var(--bg); }

        /* Victory */
        #victoryScreen {
            position:fixed; inset:0; z-index:90; display:none;
            flex-direction:column; align-items:center; justify-content:center;
            background:rgba(5,10,5,0.9);
        }
        #victoryScreen.show { display:flex; }
        .victory-text { font-family:var(--font-h); font-size:2.5rem; color:var(--gold); margin-bottom:12px; }
        .victory-sub { color:#aaa; margin-bottom:24px; }

        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        @keyframes dmgFloat {
            0%{opacity:1;transform:translateY(0) scale(1)}
            100%{opacity:0;transform:translateY(-60px) scale(1.3)}
        }
        @media(max-width:768px) {
            .title-main{font-size:2rem} .title-sub{font-size:0.8rem;letter-spacing:3px}
            .stat-bar{width:90px} .controls-hint{display:none}
        }
    </style>
</head>
<body>
    <!-- Title Screen -->
    <div id="titleScreen">
        <div class="title-bg"></div>
        <div class="title-content">
            <div class="title-icon">⚔️</div>
            <h1 class="title-main">Hào Khí Ngàn Năm</h1>
            <p class="title-sub">Cuộc Chiến Vệ Quốc</p>
            <div class="title-divider"></div>
            <button class="btn-start" id="btnStart">Bắt Đầu</button>
            <div class="controls-hint">
                <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Di chuyển &nbsp;
                <kbd>Space</kbd> Nhảy &nbsp;
                <kbd>Shift</kbd> Lướt<br>
                <kbd>J</kbd> Đánh nhẹ &nbsp;
                <kbd>K</kbd> Đánh mạnh &nbsp;
                <kbd>Q</kbd> Phòng thủ &nbsp;
                <kbd>E</kbd> Nỏ Thần &nbsp;
                <kbd>R</kbd> Triệu Hồi Rồng
            </div>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-left">
            <div class="stat-row"><span class="stat-icon">❤️</span><div class="stat-bar"><div class="stat-fill fill-hp" id="hpBar" style="width:100%"></div></div><span class="stat-text" id="hpText">100</span></div>
            <div class="stat-row"><span class="stat-icon">⚡</span><div class="stat-bar"><div class="stat-fill fill-stamina" id="staminaBar" style="width:100%"></div></div><span class="stat-text" id="staminaText">100</span></div>
            <div class="stat-row"><span class="stat-icon">🔥</span><div class="stat-bar"><div class="stat-fill fill-mana" id="manaBar" style="width:0%"></div></div><span class="stat-text" id="manaText">0</span></div>
        </div>
        <div class="hud-center">
            <div class="combo-display">Combo</div>
            <div class="combo-name" id="comboName">—</div>
            <div class="skill-slots">
                <div class="skill-slot" id="slotQ">🛡️<span class="key-hint">Q</span><div class="skill-cd" id="cdQ"></div></div>
                <div class="skill-slot" id="slotE">🏹<span class="key-hint">E</span><div class="skill-cd" id="cdE"></div></div>
                <div class="skill-slot" id="slotR">🐉<span class="key-hint">R</span><div class="skill-cd" id="cdR"></div></div>
            </div>
        </div>
        <div class="hud-right">
            <div class="stat-row"><span class="stat-text" id="killsText">Hạ: 0</span></div>
            <div class="stat-row"><span class="stat-text" id="scoreText">Điểm: 0</span></div>
        </div>
    </div>

    <!-- Death Screen -->
    <div id="deathScreen">
        <div class="death-text">Thất Bại</div>
        <p style="color:#aaa;margin-bottom:24px;">Ngọn lửa hào khí tạm tắt...</p>
        <button class="btn-retry" onclick="game.restart()">Thử Lại</button>
    </div>

    <!-- Victory Screen -->
    <div id="victoryScreen">
        <div class="victory-text">🐉 Chiến Thắng!</div>
        <p class="victory-sub">Hào khí Thăng Long vang dội!</p>
        <div id="victoryStats" style="color:#aaa;margin-bottom:24px;"></div>
        <button class="btn-retry" onclick="game.restart()">Chơi Lại</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
